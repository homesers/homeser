<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeSer - Trải Nghiệm Mua Sắm & Ẩm Thực</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body { scroll-behavior: smooth; height: 100%; }
        .dark-glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 9999px; }
    </style>
</head>
<body class="bg-[#0f172a] text-[#f8fafc] font-sans antialiased relative min-h-screen">

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <header class="dark-glass text-white shadow-xl p-4 sticky top-0 z-40 border-b border-slate-800">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="switchModule('home')">
                <div class="bg-blue-600 text-white p-2.5 rounded-xl shadow-lg flex items-center justify-center">
                    <i class="fa-solid fa-house-laptop text-xl"></i>
                </div>
                <h1 class="text-xl font-black tracking-tight"><span class="text-blue-500">Home</span><span>Ser</span></h1>
            </div>
            
            <nav class="hidden md:flex bg-slate-900/60 p-1 rounded-full border border-slate-700/50">
                <button onclick="switchModule('home')" id="btn-nav-home" class="px-5 py-2 rounded-full text-sm font-bold bg-blue-600 text-white transition">Home</button>
                <button onclick="switchModule('shop')" id="btn-nav-shop" class="px-5 py-2 rounded-full text-sm font-bold text-slate-400 hover:text-white transition">Shop</button>
                <button onclick="switchModule('food')" id="btn-nav-food" class="px-5 py-2 rounded-full text-sm font-bold text-slate-400 hover:text-white transition">Food</button>
                <button onclick="switchModule('contact')" id="btn-nav-contact" class="px-5 py-2 rounded-full text-sm font-bold text-slate-400 hover:text-white transition">Liên hệ</button>
            </nav>

            <div class="flex items-center space-x-4">
                <button onclick="toggleCart()" class="relative p-2.5 bg-slate-800 rounded-full hover:bg-slate-700 transition">
                    <i class="fa-solid fa-cart-shopping text-lg"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
                </button>
                <div id="auth-section">
                    <button onclick="openAuthModal()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-5 py-2 rounded-xl text-sm transition shadow-lg shadow-blue-600/20">
                        <i class="fa-solid fa-user mr-2"></i>Tài khoản
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-16 text-center">
        <h2 class="text-4xl md:text-5xl font-black mb-4 tracking-tight">Trải Nghiệm <span class="text-blue-500">Mua Sắm & Ẩm Thực</span> Tại Gia</h2>
        <p class="text-slate-400 max-w-xl mx-auto text-lg mb-8">Hệ thống cung cấp dịch vụ tiện ích thông minh hàng đầu cho ngôi nhà của bạn.</p>
        <div class="flex justify-center gap-4">
            <button onclick="switchModule('shop')" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white px-6 py-3 rounded-xl font-bold transition">Ghé Cửa Hàng</button>
            <button onclick="switchModule('food')" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold transition shadow-lg shadow-blue-600/20">Đặt Đồ Ăn Ngay</button>
        </div>
    </main>

    <div id="auth-modal" class="fixed inset-0 bg-black/70 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300 p-4">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-2xl shadow-2xl p-6 relative transform scale-95 transition-all duration-300 overflow-hidden">
            
            <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white text-xl transition">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <div class="flex justify-center border-b border-slate-800 mb-6">
                <button type="button" id="tab-login-btn" onclick="switchAuthTab('login')" class="w-1/2 pb-3 text-center text-base font-bold transition-all duration-300 border-b-2 border-blue-500 text-blue-500">
                    Đăng Nhập
                </button>
                <button type="button" id="tab-register-btn" onclick="switchAuthTab('register')" class="w-1/2 pb-3 text-center text-base font-bold transition-all duration-300 border-b-2 border-transparent text-slate-400 hover:text-white">
                    Đăng Ký
                </button>
            </div>

            <form id="form-login" onsubmit="executeLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Địa chỉ Email (@gmail.com)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" id="login-email" required placeholder="example@gmail.com" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 transition">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Mật khẩu</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="login-password" required placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-10 py-3 text-sm text-white focus:outline-none focus:border-blue-500 transition">
                        <button type="button" onclick="togglePasswordVisibility('login-password')" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-500 hover:text-slate-300"><i class="fa-solid fa-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl text-sm transition mt-2 shadow-lg shadow-blue-600/20">
                    Đăng Nhập <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </form>

            <form id="form-register" onsubmit="executeRegister(event)" class="space-y-4 hidden">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Họ và tên</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500"><i class="fa-solid fa-user"></i></span>
                        <input type="text" id="reg-name" required placeholder="Nguyễn Văn A" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 transition">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Địa chỉ Email (@gmail.com)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" id="reg-email" required placeholder="username@gmail.com" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 transition">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Địa chỉ nhận hàng</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500"><i class="fa-solid fa-location-dot"></i></span>
                        <input type="text" id="reg-address" required placeholder="Số 123 Đường ABC, TP.HCM" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-sm text-white focus:outline-none focus:border-blue-500 transition">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Mật khẩu</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-slate-500"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" id="reg-password" required placeholder="Tối thiểu 6 ký tự" class="w-full bg-slate-950 border border-slate-800 rounded-xl pl-10 pr-10 py-3 text-sm text-white focus:outline-none focus:border-blue-500 transition">
                        <button type="button" onclick="togglePasswordVisibility('reg-password')" class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-500 hover:text-slate-300"><i class="fa-solid fa-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl text-sm transition mt-2 shadow-lg shadow-emerald-600/20">
                    Tạo Tài Khoản Mới <i class="fa-solid fa-user-plus ml-2"></i>
                </button>
            </form>

        </div>
    </div>

    <script>
        // Cấu hình URL API Backend chạy trên Vercel của bạn
        const API_BASE_URL = "https://homeser-m3h8-ed2yjzyc8-home-ser.vercel.app/api";

        // --- 1. QUẢN LÝ GIAO DIỆN MODAL ---
        function openAuthModal() {
            const modal = document.getElementById('auth-modal');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modal.children[0].classList.remove('scale-95');
            switchAuthTab('login'); // Mặc định mở tab đăng nhập
        }

        function closeAuthModal() {
            const modal = document.getElementById('auth-modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.children[0].classList.add('scale-95');
        }

        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // --- 2. HIỆU ỨNG HIGHLIGHT PHÂN CHIA VÙNG ĐĂNG NHẬP / ĐĂNG KÝ RÕ RÀNG ---
        function switchAuthTab(type) {
            const loginBtn = document.getElementById('tab-login-btn');
            const registerBtn = document.getElementById('tab-register-btn');
            const formLogin = document.getElementById('form-login');
            const formRegister = document.getElementById('form-register');

            if (type === 'login') {
                // Đổi trạng thái nút Highlight Tab
                loginBtn.className = "w-1/2 pb-3 text-center text-base font-bold transition-all duration-300 border-b-2 border-blue-500 text-blue-500";
                registerBtn.className = "w-1/2 pb-3 text-center text-base font-bold transition-all duration-300 border-b-2 border-transparent text-slate-400 hover:text-white";
                // Ẩn/Hiện form
                formLogin.classList.remove('hidden');
                formRegister.classList.add('hidden');
            } else {
                // Đổi trạng thái nút Highlight Tab
                registerBtn.className = "w-1/2 pb-3 text-center text-base font-bold transition-all duration-300 border-b-2 border-blue-500 text-blue-500";
                loginBtn.className = "w-1/2 pb-3 text-center text-base font-bold transition-all duration-300 border-b-2 border-transparent text-slate-400 hover:text-white";
                // Ẩn/Hiện form
                formRegister.classList.remove('hidden');
                formLogin.classList.add('hidden');
            }
        }

        // --- 3. HÀM TẠO THÔNG BÁO HIỆN ĐẠI (TOAST NOTIFICATION) THAY THẾ ALERT MẶC ĐỊNH ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            if (!container) return;

            const toast = document.createElement('div');
            const bgClass = type === 'success' ? 'bg-emerald-500 shadow-emerald-500/10' : 'bg-rose-500 shadow-rose-500/10';
            const icon = type === 'success' 
                ? '<i class="fa-solid fa-circle-check text-lg"></i>' 
                : '<i class="fa-solid fa-circle-xmark text-lg"></i>';

            toast.className = `flex items-center gap-3 px-5 py-3.5 ${bgClass} text-white font-semibold rounded-xl shadow-xl transform translate-x-full transition-all duration-300 opacity-0 pointer-events-auto border border-white/10`;
            toast.innerHTML = `<span>${icon}</span><span class="text-sm tracking-wide">${message}</span>`;
            
            container.appendChild(toast);

            // Kích hoạt hiệu ứng trượt từ phải vào màn hình
            setTimeout(() => {
                toast.classList.remove('translate-x-full', 'opacity-0');
            }, 10);

            // Tự động thu hồi và hủy thông báo sau 3.5 giây
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // --- 4. XỬ LÝ LOGIC ĐĂNG NHẬP (GỬI LÊN SERVER BACKEND MỚI) ---
        async function executeLogin(event) {
            event.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    showToast(result.message, 'success');
                    localStorage.setItem('user', JSON.stringify(result.user));
                    
                    // Cập nhật giao diện thanh Header sau khi đăng nhập thành công
                    document.getElementById('auth-section').innerHTML = `
                        <div class="flex items-center space-x-3 bg-slate-800/80 px-4 py-2 rounded-xl border border-slate-700">
                            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                            <span class="text-sm font-medium text-slate-200">Hi, ${result.user.name}</span>
                            <button onclick="executeLogout()" class="text-slate-400 hover:text-rose-400 text-xs font-bold pl-2 border-l border-slate-700 transition">Thoát</button>
                        </div>`;
                    
                    closeAuthModal();
                } else {
                    // Trả về chính xác thông báo từ server: "Sai tài khoản Gmail hoặc Mật khẩu!"
                    showToast(result.message || "Đăng nhập thất bại!", 'error');
                }
            } catch (error) {
                showToast("Không thể kết nối tới máy chủ. Vui lòng thử lại sau!", 'error');
            }
        }

        // --- 5. XỬ LÝ LOGIC ĐĂNG KÝ TÀI KHOẢN MỚI ---
        async function executeRegister(event) {
            event.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const address = document.getElementById('reg-address').value;
            const password = document.getElementById('reg-password').value;

            try {
                const response = await fetch(`${API_BASE_URL}/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, address, password })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    showToast(result.message, 'success');
                    // Tự động điền tài khoản vừa tạo qua khung đăng nhập để khách dùng luôn
                    document.getElementById('login-email').value = email;
                    document.getElementById('login-password').value = password;
                    switchAuthTab('login');
                } else {
                    showToast(result.message || "Đăng ký không thành công!", 'error');
                }
            } catch (error) {
                showToast("Kết nối server thất bại khi đăng ký!", 'error');
            }
        }

        // --- 6. LOGIC ĐĂNG XUẤT ---
        function executeLogout() {
            localStorage.removeItem('user');
            location.reload();
        }

        // --- 7. KIỂM TRA PHIÊN ĐĂNG NHẬP CŨ KHI TẢI LẠI TRANG ---
        window.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('user');
            if (savedUser) {
                const user = JSON.parse(savedUser);
                document.getElementById('auth-section').innerHTML = `
                    <div class="flex items-center space-x-3 bg-slate-800/80 px-4 py-2 rounded-xl border border-slate-700">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span class="text-sm font-medium text-slate-200">Hi, ${user.name}</span>
                        <button onclick="executeLogout()" class="text-slate-400 hover:text-rose-400 text-xs font-bold pl-2 border-l border-slate-700 transition">Thoát</button>
                    </div>`;
            }
        });

        // Hàm giả lập các tính năng chuyển trang/giỏ hàng khác
        function switchModule(moduleName) { console.log("Chuyển sang module: " + moduleName); }
        function toggleCart() { console.log("Mở giỏ hàng"); }
    </script>
</body>
</html>
