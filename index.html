<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeSer - Ngôi Nhà Shop & Food Thông Minh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body { scroll-behavior: auto !important; height: 100%; }
        body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif; background-color: #0b0f19; color: #f1f5f9; }
        .brand-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); }
        .dark-glass { background: rgba(11, 15, 25, 0.95); backdrop-filter: blur(12px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0b0f19; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 9999px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .animate-toast { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="custom-scrollbar relative">
    <div id="toast-container" class="fixed top-24 right-6 z-[60] space-y-3 pointer-events-none"></div>
    <header class="dark-glass text-white shadow-xl p-4 sticky top-0 z-50 border-b border-slate-800/80">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="switchModule('home')">
                <div class="bg-blue-600 text-white p-2.5 rounded-xl shadow-lg flex items-center justify-center"><i class="fa-solid fa-house-laptop text-xl"></i></div>
                <h1 class="text-3xl font-black tracking-tight"><span class="text-blue-500">Home</span><span class="text-white">Ser</span></h1>
            </div>
            <nav class="hidden md:flex bg-slate-800/60 p-1 rounded-full border border-slate-700/50">
                <button onclick="switchModule('home')" id="btn-nav-home" class="nav-btn px-5 py-2 rounded-full text-sm font-bold bg-blue-600 text-white shadow-md transition"><i class="fa-solid fa-house"></i> <span>Home</span></button>
                <button onclick="switchModule('shop')" id="btn-nav-shop" class="nav-btn px-5 py-2 rounded-full text-sm font-bold text-slate-400 hover:text-white transition"><i class="fa-solid fa-bag-shopping"></i> <span>Shop</span></button>
                <button onclick="switchModule('food')" id="btn-nav-food" class="nav-btn px-5 py-2 rounded-full text-sm font-bold text-slate-400 hover:text-white transition"><i class="fa-solid fa-utensils"></i> <span>Food</span></button>
                <button onclick="switchModule('contact')" id="btn-nav-contact" class="nav-btn px-5 py-2 rounded-full text-sm font-bold text-slate-400 hover:text-white transition"><i class="fa-solid fa-address-book"></i> <span>Liên hệ</span></button>
            </nav>
            <div class="flex items-center space-x-4">
                <button onclick="openCart()" class="relative p-2.5 bg-slate-800 rounded-full hover:bg-slate-700 transition"><i class="fa-solid fa-cart-shopping text-blue-400"></i><span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span></button>
                <div id="auth-header-zone"></div>
            </div>
        </div>
    </header>
    <main class="container mx-auto px-4 max-w-7xl">
        </main>
        <div class="fixed bottom-6 right-6 z-50 flex flex-col items-end">
        </div>

    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full sm:w-96 bg-slate-950 border-l border-slate-800/80 z-50 transform translate-x-full transition-transform duration-300 shadow-2xl flex flex-col justify-between hidden">
        </div>

    <div id="auth-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden z-[100] flex items-center justify-center p-4">
        <div class="bg-slate-900 p-6 rounded-2xl w-96 border border-slate-700 shadow-2xl relative">
            <button onclick="closeAuthModal()" class="absolute top-4 right-4 text-slate-400"><i class="fa-solid fa-xmark"></i></button>
            <h3 class="text-white text-lg font-bold mb-4 text-center">Đăng nhập HomeSer</h3>
            <input id="auth-name" type="text" placeholder="Họ tên (Khi đăng ký)" class="w-full mb-3 bg-slate-800 text-white p-3 rounded-lg border border-slate-700">
            <input id="auth-email" type="email" placeholder="Email" class="w-full mb-3 bg-slate-800 text-white p-3 rounded-lg border border-slate-700">
            <input id="auth-password" type="password" placeholder="Mật khẩu" class="w-full mb-4 bg-slate-800 text-white p-3 rounded-lg border border-slate-700">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="registerUser()" class="bg-slate-700 text-white py-2 rounded-lg font-bold">Đăng ký</button>
                <button onclick="loginUser()" class="bg-blue-600 text-white py-2 rounded-lg font-bold">Đăng nhập</button>
            </div>
        </div>
    </div>

    <footer class="bg-slate-950 text-slate-500 py-10 text-center text-xs border-t border-slate-900 mt-20">
        <p>&copy; 2026 HomeSer. Phát triển bởi Nguyễn Đình Hào.</p>
    </footer>

    <script>
        // LOGIC AUTH TÍCH HỢP
        let currentUser = JSON.parse(localStorage.getItem("homeser_current_user"));
        function renderAuthUI() {
            const zone = document.getElementById("auth-header-zone");
            if(currentUser){
                zone.innerHTML = `<div class="flex items-center space-x-3 bg-slate-800 py-1.5 px-4 rounded-xl border border-slate-700"><span class="text-xs font-bold text-white">${currentUser.name}</span><button onclick="handleLogout()" class="text-red-400 text-xs">Đăng xuất</button></div>`;
            } else {
                zone.innerHTML = `<button onclick="openAuthModal()" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-xs font-bold">Đăng nhập</button>`;
            }
        }
        function openAuthModal() { document.getElementById("auth-modal").classList.remove("hidden"); }
        function closeAuthModal() { document.getElementById("auth-modal").classList.add("hidden"); }
        function registerUser(){
            const name = document.getElementById("auth-name").value;
            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;
            if(!name || !email || !password) return alert("Nhập đủ thông tin");
            let users = JSON.parse(localStorage.getItem("homeser_users")) || [];
            users.push({name, email, password}); localStorage.setItem("homeser_users", JSON.stringify(users));
            alert("Đăng ký thành công!");
        }
        function loginUser(){
            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;
            let users = JSON.parse(localStorage.getItem("homeser_users")) || [];
            let user = users.find(u=>u.email===email && u.password===password);
            if(!user) return alert("Sai thông tin");
            localStorage.setItem("homeser_current_user", JSON.stringify(user));
            currentUser = user; renderAuthUI(); closeAuthModal();
        }
        function handleLogout(){ localStorage.removeItem("homeser_current_user"); currentUser = null; renderAuthUI(); }

        // CHÈN TOÀN BỘ SCRIPT CŨ CỦA BẠN VÀO DƯỚI ĐÂY:
        window.onload = () => {
            renderAuthUI();
            // ... (Copy các hàm cũ của bạn vào đây) ...
        };
    </script>
</body>
</html>
